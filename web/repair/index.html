<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Riparazioni</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/custom.css">
    <!-- Link per le icone Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/main.html"> <!-- Modificato qui -->
                <i class="bi bi-gear-fill me-2"></i> Gestionale Reparto Produzione
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/main.html"> <!-- Modificato qui -->
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/repair/index.html">Riparazioni</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" href="#">Ordini (futuro)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" href="#">Documentazione (futuro)</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="mb-4 text-center text-info">Gestione Riparazioni</h1>
        <p class="lead text-center mb-5">Visualizza lo stato delle riparazioni o aggiungi una nuova riparazione.</p>

        <div class="row">
            <div class="col-md-12 text-end mb-4">
                <button class="btn btn-success" id="addNewRepairBtn"><i class="bi bi-plus-circle me-2"></i>Aggiungi
                    Nuova Riparazione</button>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-info text-white">
                <h5 class="card-title mb-0">Elenco Riparazioni</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle">
                        <thead>
                            <tr>
                                <th>Repair OA</th>
                                <th>Service ODS</th>
                                <th>Data Inserimento</th>
                                <th>Stato</th>
                                <th class="text-center">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="repairsTableBody">
                            <!-- Le righe verranno popolate qui via JavaScript -->
                            <tr>
                                <td colspan="5" class="text-center text-muted">Caricamento riparazioni...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS (bundle include Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <!-- Eel JavaScript (per comunicare con Python) -->
    <script type="text/javascript" src="/eel.js"></script>
    <!-- Custom JavaScript globale -->
    <script type="text/javascript" src="/js/app.js"></script>
    <!-- JavaScript specifico per la sezione riparazioni -->
    <script type="text/javascript" src="/js/repair.js"></script>

</body>

</html>

{% extends 'base.html' %}
{% block title %}Modifica Riparazione #{{ riparazione.id }} – Gestione Riparazioni{% endblock %}

{% block content %}
<div class="mb-3">
  <a href="{{ url_for('dettaglio_riparazione', id=riparazione.id) }}" class="text-decoration-none">
    <i class="bi bi-arrow-left me-1"></i>Torna al dettaglio
  </a>
</div>
<h1 class="h3 mb-4"><i class="bi bi-pencil me-2"></i>Modifica Riparazione #{{ riparazione.id }}</h1>

<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Nome Cliente *</label>
          <input type="text" name="nome_cliente" class="form-control" value="{{ riparazione.nome_cliente }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Telefono *</label>
          <input type="text" name="telefono_cliente" class="form-control" value="{{ riparazione.telefono_cliente }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Tipo Dispositivo *</label>
          <select name="tipo_dispositivo" class="form-select" required>
            {% for tipo in tipi %}
            <option value="{{ tipo }}" {{ 'selected' if tipo == riparazione.tipo_dispositivo }}>{{ tipo }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Marca / Modello *</label>
          <input type="text" name="marca_modello" class="form-control" value="{{ riparazione.marca_modello }}" required>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Descrizione Problema *</label>
          <textarea name="descrizione_problema" class="form-control" rows="3" required>{{ riparazione.descrizione_problema }}</textarea>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Stato</label>
          <select name="stato" class="form-select">
            {% for stato_key, stato_label in stati.items() %}
            <option value="{{ stato_key }}" {{ 'selected' if stato_key == riparazione.stato }}>{{ stato_label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Tecnico</label>
          <input type="text" name="tecnico" class="form-control" value="{{ riparazione.tecnico or '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Costo (€)</label>
          <input type="number" name="costo" class="form-control" step="0.01" min="0"
                 value="{{ riparazione.costo or '' }}">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Note</label>
          <textarea name="note" class="form-control" rows="2">{{ riparazione.note or '' }}</textarea>
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Aggiorna</button>
          <a href="{{ url_for('dettaglio_riparazione', id=riparazione.id) }}" class="btn btn-outline-secondary">Annulla</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
